    /* ===================== 16. RESET & BASE ===================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      scroll-padding-top: 130px;
    }

    body {
      font-family: var(--f-body);
      background: var(--bg);
      color: var(--c1);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ===================== 6. LAYOUT SHELL ===================== */
    .shell {
      width: 100%;
      margin: 0 auto;
      padding: 0 var(--s-3);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    @media (min-width: 400px) { .shell { padding: 0 var(--s-4); } }
    @media (min-width: 640px) { .shell { padding: 0 var(--s-6); max-width: 700px; } }
    @media (min-width: 768px) { .shell { padding: 0 var(--s-7); max-width: 820px; } }
    @media (min-width: 1024px) { .shell { padding: 0 var(--s-8); max-width: 960px; } }
    @media (min-width: 1280px) { .shell { max-width: 1060px; } }
    @media (min-width: 1536px) { .shell { max-width: 1120px; } }

    /* ===================== 7. HERO ===================== */
    .hero {
      background: var(--bg-hero);
      color: var(--bg-hero-text);
      padding: var(--s-6) var(--s-5) var(--s-5);
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      margin: 0 calc(-1 * var(--s-3));
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--hero-pat, none);
      background-size: var(--hero-pat-size, auto);
      pointer-events: none;
    }

    .hero h1 {
      font-family: var(--f-body);
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: var(--s-1);
      position: relative;
    }

    .hero-meta {
      font-size: 0.8125rem;
      opacity: 0.88;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }

    .hero-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .hero-logo {
      max-width: 160px;
      max-height: 72px;
      border-radius: 12px;
      object-fit: contain;
      border: 3px solid rgba(255,255,255,0.35);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      margin-bottom: var(--s-2);
      display: block;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      background: rgba(255,255,255,0.1);
    }

    @media (min-width: 400px) {
      .hero {
        margin: 0 calc(-1 * var(--s-4));
        padding: var(--s-7) var(--s-6) var(--s-6);
      }
      .hero h1 { font-size: 1.65rem; }
    }
    @media (min-width: 640px) {
      .hero {
        margin: var(--s-3) 0 0;
        border-radius: var(--r-xl);
        padding: var(--s-8) var(--s-7) var(--s-7);
      }
      .hero h1 { font-size: 1.875rem; }
      .hero-meta { font-size: 0.875rem; }
      .hero-logo { max-width: 200px; max-height: 88px; }
    }
    @media (min-width: 768px) {
      .hero { padding: var(--s-9) var(--s-8) var(--s-8); }
      .hero h1 { font-size: 2rem; }
      .hero-logo { max-width: 220px; max-height: 96px; }
    }
    @media (min-width: 1024px) {
      .hero h1 { font-size: 2.25rem; }
      .hero-meta { font-size: 0.9375rem; }
    }

    /* ===================== 8. SEARCH & FILTER BAR ===================== */
    .toolbar {
      display: flex;
      gap: var(--s-2);
      align-items: stretch;
      margin-top: var(--s-3);
      position: relative;
    }

    .search-box {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      padding: 0 var(--s-4) 0 38px;
      border: 1.5px solid var(--search-border);
      border-radius: var(--r-lg);
      background: var(--search-bg);
      color: var(--c1);
      font-family: var(--f-body);
      font-size: 0.875rem;
      outline: none;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
      -webkit-appearance: none;
      appearance: none;
    }

    .search-box input::placeholder { color: var(--c3); }

    .search-box input:focus {
      border-color: var(--search-focus);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--search-focus) 12%, transparent);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--c3);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--c3);
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }

    .search-clear.visible { display: flex; }
    .search-clear:hover { background: var(--accent-soft); }

    /* Filter dropdown */
    .filter-wrap { position: relative; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 42px;
      padding: 0 var(--s-3);
      border: 1.5px solid var(--search-border);
      border-radius: var(--r-lg);
      background: var(--filter-bg);
      color: var(--c2);
      font-family: var(--f-body);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color var(--t-fast), background var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--filter-active-border);
    }

    .filter-btn.active {
      background: var(--filter-active-bg);
      color: var(--accent);
    }

    .filter-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .filter-chevron {
      width: 12px;
      height: 12px;
      transition: transform var(--t-fast);
    }

    .filter-btn.open .filter-chevron { transform: rotate(180deg); }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 150px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-md);
      z-index: 80;
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity var(--t-fast), transform var(--t-fast);
      overflow: hidden;
    }

    .filter-dropdown.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: var(--s-2);
      padding: var(--s-3) var(--s-4);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--c1);
      cursor: pointer;
      transition: background var(--t-fast);
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--f-body);
    }

    .filter-option:hover { background: var(--accent-soft); }
    .filter-option.selected { color: var(--accent); font-weight: 700; }

    .filter-option .fo-icon {
      width: 18px; height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .filter-option .fo-check {
      width: 16px; height: 16px;
      margin-left: auto;
      color: var(--accent);
      opacity: 0;
    }

    .filter-option.selected .fo-check { opacity: 1; }

    /* ===================== 9. CATEGORY NAV ===================== */
    .cat-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: var(--s-2) 0;
      margin: 0 calc(-1 * var(--s-3));
      padding-left: var(--s-3);
      padding-right: var(--s-3);
      transition: box-shadow var(--t-base) var(--ease-out);
    }

    @media (min-width: 400px) {
      .cat-nav {
        margin: 0 calc(-1 * var(--s-4));
        padding-left: var(--s-4);
        padding-right: var(--s-4);
      }
    }
    @media (min-width: 640px) {
      .cat-nav {
        margin: 0 calc(-1 * var(--s-6));
        padding-left: var(--s-6);
        padding-right: var(--s-6);
      }
    }
    @media (min-width: 768px) {
      .cat-nav {
        margin: 0 calc(-1 * var(--s-7));
        padding-left: var(--s-7);
        padding-right: var(--s-7);
        padding-top: var(--s-3);
        padding-bottom: var(--s-3);
      }
    }
    @media (min-width: 1024px) {
      .cat-nav {
        margin: 0 calc(-1 * var(--s-8));
        padding-left: var(--s-8);
        padding-right: var(--s-8);
      }
    }

    .cat-nav.scrolled { box-shadow: 0 2px 16px rgba(0,0,0,0.08); }

    .cat-nav-track {
      display: flex;
      gap: var(--s-2);
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
      mask-image: linear-gradient(to right, black calc(100% - 28px), transparent);
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 28px), transparent);
    }

    .cat-nav-track.no-fade {
      mask-image: none;
      -webkit-mask-image: none;
    }

    .cat-nav-track::-webkit-scrollbar { display: none; }

    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--bg-card);
      color: var(--c2);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      border: 1.5px solid var(--border);
      scroll-snap-align: start;
      transition: all var(--t-fast) var(--ease-out);
      text-decoration: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 32px;
    }

    @media (min-width: 400px) {
      .cat-pill {
        padding: var(--s-2) var(--s-4);
        font-size: 0.8125rem;
        gap: 5px;
        min-height: 36px;
      }
    }
    @media (min-width: 768px) {
      .cat-pill {
        padding: var(--s-2) var(--s-5);
        font-size: 0.875rem;
        min-height: 38px;
      }
    }

    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }

    .cat-pill.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .cat-pill-count {
      font-size: 0.625rem;
      font-family: var(--f-body);
      font-variant-numeric: tabular-nums;
      opacity: 0.65;
      font-weight: 500;
    }

    .cat-pill.active .cat-pill-count { opacity: 0.8; }
    .cat-pill.cat-hidden { display: none; }

    /* ===================== 10. CATEGORY SECTIONS ===================== */
    .cat-section {
      margin-top: var(--s-4);
      scroll-margin-top: 120px;
    }

    .cat-section:first-of-type { margin-top: var(--s-2); }
    .cat-section.cat-hidden { display: none; }

    .cat-head {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      margin-bottom: var(--s-3);
      padding: var(--s-2) 2px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      border-radius: var(--r-sm);
      transition: background var(--t-fast);
    }

    .cat-head:hover { background: var(--accent-soft); }

    .cat-bar {
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: var(--cat-accent);
      flex-shrink: 0;
    }

    .cat-title {
      font-family: var(--f-body);
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--c1);
      letter-spacing: -0.01em;
      flex: 1;
      min-width: 0;
    }

    .cat-count {
      font-family: var(--f-body);
      font-variant-numeric: tabular-nums;
      font-size: 0.625rem;
      font-weight: 500;
      color: var(--c3);
      padding: 3px var(--s-2);
      background: var(--cat-soft);
      border-radius: var(--r-pill);
      border: 1px solid var(--cat-border);
      white-space: nowrap;
    }

    .cat-chevron {
      width: 20px;
      height: 20px;
      color: var(--c3);
      transition: transform var(--t-base) var(--ease-out);
      flex-shrink: 0;
    }

    .cat-head.collapsed .cat-chevron { transform: rotate(-90deg); }

    .cat-items-wrap {
      overflow: hidden;
      transition: max-height var(--t-slow) var(--ease-out), opacity var(--t-base) var(--ease-out);
    }

    .cat-items-wrap.collapsed {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    /* ===================== 11. ITEMS GRID ===================== */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--s-3);
    }

    @media (min-width: 640px) { .items-grid { gap: var(--s-4); } }
    @media (min-width: 768px) { .items-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .items-grid { grid-template-columns: repeat(3, 1fr); gap: var(--s-5); } }
    @media (min-width: 1280px) { .items-grid { grid-template-columns: repeat(4, 1fr); } }

    /* ===================== 12. ITEM CARD ===================== */
    .item-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      position: relative;
      cursor: default;
      transition:
        box-shadow var(--t-fast) var(--ease-out),
        transform var(--t-fast) var(--ease-out);
    }

    .item-card:active { transform: scale(0.98); }

    @media (hover: hover) {
      .item-card:hover {
        box-shadow: var(--card-shadow-hover);
        transform: translateY(-2px);
      }
    }

    .item-card.is-popular { border-top: 3px solid var(--pop-card-border); }

    .item-card.item-hidden { display: none; }

    /* Image area */
    .item-img-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--skel-base);
    }

    .item-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
      transition: opacity var(--t-base);
    }

    .item-placeholder-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--skel-base);
    }

    .item-placeholder-icon svg {
      width: 40%;
      height: 40%;
      max-width: 56px;
      max-height: 56px;
      color: var(--placeholder-icon);
      opacity: 0.5;
    }

    /* Popular ribbon */
    .pop-ribbon {
      position: absolute;
      top: var(--s-2);
      left: var(--s-2);
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      background: var(--pop-bg);
      color: var(--pop-text);
      border: 1px solid var(--pop-border);
      font-size: 0.5625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      line-height: 1.7;
      z-index: 2;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Item body below image */
    .item-body {
      padding: var(--s-3);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .item-name-row {
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }

    .item-name {
      font-weight: 600;
      font-size: 0.8125rem;
      line-height: 1.35;
      color: var(--c1);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .item-name.truncated {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .item-name.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }

    .item-desc {
      font-size: 0.6875rem;
      color: var(--c3);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-desc.truncated {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .item-desc.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }

    .item-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 4px;
    }

    .item-price {
      font-family: var(--f-body);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--price);
      letter-spacing: -0.02em;
    }

    /* ===================== 13. BADGES ===================== */
    .b-veg, .b-nv {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .b-veg { border: 2px solid var(--veg); }
    .b-veg::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--veg);
    }

    .b-nv { border: 2px solid var(--nonveg); }
    .b-nv::after {
      content: '';
      width: 0; height: 0;
      border-left: 4.5px solid transparent;
      border-right: 4.5px solid transparent;
      border-bottom: 7.5px solid var(--nonveg);
    }

    /* ===================== 14. SKELETON LOADING ===================== */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .sk {
      animation: shimmer 1.5s ease-in-out infinite;
      background: linear-gradient(90deg,
        var(--skel-base) 0%,
        var(--skel-shine) 40%,
        var(--skel-base) 80%
      );
      background-size: 800px 100%;
      border-radius: var(--r-sm);
    }

    .sk-hero {
      height: 120px;
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      margin: 0 calc(-1 * var(--s-3));
    }
    @media (min-width: 400px) { .sk-hero { height: 140px; margin: 0 calc(-1 * var(--s-4)); } }
    @media (min-width: 640px) { .sk-hero { height: 160px; margin: 0; border-radius: var(--r-xl); } }
    @media (min-width: 768px) { .sk-hero { height: 180px; } }

    .sk-search {
      height: 42px;
      border-radius: var(--r-lg);
      margin-top: var(--s-3);
    }

    .sk-nav {
      display: flex;
      gap: var(--s-2);
      padding: var(--s-3) 0;
      overflow: hidden;
    }

    .sk-pill {
      width: 80px;
      height: 36px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
    }

    .sk-sec { margin-top: var(--s-5); }

    .sk-cat-title {
      width: 140px;
      height: 22px;
      margin-bottom: var(--s-3);
    }

    .sk-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--s-3);
    }
    @media (min-width: 768px) { .sk-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1280px) { .sk-grid { grid-template-columns: repeat(4, 1fr); } }

    .sk-card {
      background: var(--bg-card);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .sk-card-img { aspect-ratio: 1; }

    .sk-card-body {
      padding: var(--s-3);
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
    }

    .sk-line { height: 13px; border-radius: 4px; }
    .sk-line.w70 { width: 70%; }
    .sk-line.w50 { width: 50%; }
    .sk-line.w30 { width: 30%; }

    /* ===================== 15. IMAGE MODAL ===================== */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-base) var(--ease-out);
      cursor: pointer;
      overscroll-behavior: contain;
    }

    .modal.open { opacity: 1; pointer-events: auto; }

    .modal img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: var(--r-md);
      object-fit: contain;
      transform: scale(0.9);
      transition: transform var(--t-slow) var(--ease-spring);
      user-select: none;
      -webkit-user-drag: none;
    }

    .modal.open img { transform: scale(1); }

    .modal-x {
      position: fixed;
      top: var(--s-4);
      right: var(--s-4);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 201;
      transition: background var(--t-fast);
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-x:hover { background: rgba(255,255,255,0.22); }

    /* ===================== 16. STATE CARDS ===================== */
    .state-card {
      text-align: center;
      padding: var(--s-10) var(--s-6);
      color: var(--c2);
    }

    .state-icon { font-size: 3rem; margin-bottom: var(--s-4); display: block; }

    .state-card h2 {
      font-family: var(--f-body);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--c1);
      margin-bottom: var(--s-2);
    }

    .state-card p {
      font-size: 0.875rem;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      margin-top: var(--s-6);
      padding: var(--s-3) var(--s-6);
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: var(--r-pill);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: var(--f-body);
      cursor: pointer;
      transition: all var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }

    .retry-btn:hover { opacity: 0.9; }
    .retry-btn:active { transform: scale(0.95); }

    /* No results from search / filter */
    .no-results {
      text-align: center;
      padding: var(--s-8) var(--s-4);
      color: var(--c3);
    }

    .no-results-icon { font-size: 2.5rem; margin-bottom: var(--s-3); display: block; }

    .no-results p { font-size: 0.875rem; font-weight: 500; }

    .no-results .clear-link {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      border: none;
      background: none;
      font-family: var(--f-body);
      font-size: 0.875rem;
      text-decoration: underline;
      text-underline-offset: 2px;
      margin-top: var(--s-2);
      display: inline-block;
    }

    /* ===================== 17. BACK TO TOP ===================== */
    .top-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 90;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: var(--accent-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px) scale(0.9);
      transition: opacity var(--t-base), transform var(--t-base) var(--ease-spring);
      pointer-events: none;
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
      -webkit-tap-highlight-color: transparent;
    }

    .top-btn.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .top-btn:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.22); }
    .top-btn:active { transform: scale(0.9); }

    /* ===================== 18. FOOTER ===================== */
    .menu-footer {
      text-align: center;
      padding: var(--s-8) 0 var(--s-6);
      color: var(--footer);
      font-size: 0.75rem;
      line-height: 1.8;
    }

    .menu-footer a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .menu-footer-brand {
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }

    /* ===================== 19. ANIMATIONS ===================== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim { animation: fadeUp var(--t-slow) var(--ease-out) both; }

    .anim-scroll {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity var(--t-slow) var(--ease-out), transform var(--t-slow) var(--ease-out);
    }
    .anim-scroll.visible { opacity: 1; transform: translateY(0); }

    /* ===================== 20. RESPONSIVE REFINEMENTS ===================== */
    @media (min-width: 400px) {
      .item-name { font-size: 0.875rem; }
      .item-desc { font-size: 0.75rem; }
      .item-price { font-size: 0.9375rem; }
    }
    @media (min-width: 640px) {
      .cat-title { font-size: 1.25rem; }
      .cat-head { margin-bottom: var(--s-4); }
      .cat-section { margin-top: var(--s-5); }
      .cat-section:first-of-type { margin-top: var(--s-3); }
      .item-body { padding: var(--s-3) var(--s-4); }
      .item-name { font-size: 0.9375rem; -webkit-line-clamp: 2; }
      .item-desc { font-size: 0.8125rem; -webkit-line-clamp: 2; }
      .item-price { font-size: 1rem; }
    }
    @media (min-width: 768px) {
      .cat-title { font-size: 1.375rem; }
      .cat-bar { height: 26px; }
      .cat-section { margin-top: var(--s-6); }
      .cat-section:first-of-type { margin-top: var(--s-4); }
      .item-name { font-size: 1rem; -webkit-line-clamp: 2; }
      .item-price { font-size: 1.0625rem; }
      .pop-ribbon { font-size: 0.625rem; padding: 3px 10px; }
    }
    @media (min-width: 1024px) {
      .cat-title { font-size: 1.5rem; }
      .item-name { font-size: 1.0625rem; }
      .item-desc { font-size: 0.875rem; }
      .item-price { font-size: 1.125rem; }
      .cat-count { font-size: 0.6875rem; }
      .search-box input { height: 46px; font-size: 0.9375rem; }
      .filter-btn { height: 46px; font-size: 0.875rem; }
    }
    @media (min-width: 1280px) {
      .cat-title { font-size: 1.625rem; }
    }

    /* ===================== 21. PRINT ===================== */
    @media print {
      .cat-nav, .modal, .menu-footer, .top-btn, .toolbar { display: none !important; }
      .item-card { break-inside: avoid; border: 1px solid #ccc !important; }
      body { background: #fff !important; color: #000 !important; }
      .hero { background: #eee !important; color: #000 !important; border-radius: 0 !important; }
    }

    /* ===================== 22. ACCESSIBILITY ===================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>

          <div class="sk-card"><div class="sk sk-card-img"></div><div class="sk-card-body"><div class="sk sk-line w50"></div><div class="sk sk-line w30"></div></div></div>
          <div class="sk-card"><div class="sk sk-card-img"></div><div class="sk-card-body"><div class="sk sk-line w70"></div><div class="sk sk-line w30"></div></div></div>

        </div>
      </div>

    <!-- Content injected by menu.js -->

  </button>

  <!-- No-JS Fallback -->
  <noscript>

      <div style="font-size:2.5rem;margin-bottom:1rem;">&#127860;</div>
      <h2 style="color:#444;margin-bottom:0.5rem;font-size:1.125rem;">JavaScript Required</h2>

  <script src="/menu.js"></script>
